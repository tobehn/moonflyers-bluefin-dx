---
name: Dependabot auto-merge

# Enables auto-merge on Dependabot PRs. The actual merge only happens once all
# required status checks pass — so branch protection on `main` must require the
# image build (job "Build and push image" from build.yml). Without that gate,
# auto-merge would merge immediately, before the build runs.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Auto-merge minor + patch updates. Major bumps stay manual for review.
      - name: Enable auto-merge (minor/patch)
        if: steps.meta.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
